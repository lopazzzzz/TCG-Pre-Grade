<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TCG Pre-Grade — History</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <h1 class="app-header__title">TCG Pre-Grade</h1>
  <nav class="app-header__nav">
    <a href="index.html" class="app-header__link">New Pre-Grade</a>
    <a href="history.html" class="app-header__link is-active">History</a>
  </nav>
</header>

<main class="app-main">
  <section class="panel">
    <div class="filter-row">
      <button type="button" class="filter-btn is-active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="pokemon">Pokemon</button>
      <button type="button" class="filter-btn" data-filter="onepiece">One Piece</button>
    </div>
    <div id="history-grid" class="history-grid"></div>
    <p id="history-empty" class="empty-state" style="display:none">ยังไม่มีการ์ดที่เคย Pre-Grade</p>
  </section>
</main>

<div id="detail-modal" class="modal">
  <div class="modal__panel">
    <button type="button" class="modal__close" id="detail-modal-close">&times;</button>
    <div id="detail-modal-body"></div>
  </div>
</div>

<script type="module" src="js/history.js"></script>
</body>
</html>
